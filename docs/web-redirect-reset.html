<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Redirecting… | FitForge</title>
		<style>
			body {
				background: #18181b;
				color: #fff;
				font-family: "Inter", "Segoe UI", Arial, sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
			}
			.container {
				background: #27272a;
				border-radius: 24px;
				padding: 2.5rem 2rem;
				box-shadow: 0 4px 32px rgba(0, 0, 0, 0.18);
				display: flex;
				flex-direction: column;
				align-items: center;
				max-width: 90vw;
			}
			.logo {
				width: 64px;
				height: 64px;
				margin-bottom: 1.5rem;
			}
			h1 {
				font-size: 2rem;
				font-weight: 700;
				margin: 0 0 0.5rem 0;
				letter-spacing: -1px;
				color: #22c55e;
			}
			p {
				color: #a1a1aa;
				font-size: 1.1rem;
				margin-bottom: 1.5rem;
				text-align: center;
			}
			.spinner {
				border: 4px solid #27272a;
				border-top: 4px solid #22c55e;
				border-radius: 50%;
				width: 36px;
				height: 36px;
				animation: spin 1s linear infinite;
				margin-bottom: 1rem;
			}
			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
				}
			}
			.error {
				color: #ef4444;
				font-weight: 600;
				margin-top: 1rem;
			}
		</style>
		<script>
			window.onload = function () {
				const params = new URLSearchParams(window.location.search);
				const access_token = params.get("access_token");
				const refresh_token = params.get("refresh_token");
				if (access_token && refresh_token) {
					window.location.href = `fitforge://reset-password?access_token=${access_token}&refresh_token=${refresh_token}`;
				} else {
					document.getElementById("error").textContent =
						"Missing tokens in URL.";
				}
			};
		</script>
	</head>
	<body>
		<div class="container">
			<h1>Redirecting…</h1>
			<div class="spinner"></div>
			<p>
				Sending you back to the FitForge app.<br />If nothing happens, you can
				close this page.
			</p>
			<div id="error" class="error"></div>
		</div>
	</body>
</html>
